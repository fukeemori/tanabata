<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>七夕 願い事メーカー</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Yomogi&family=Zen+Kurenaido&family=Kiwi+Maru&family=Kaisei+Decol&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: #f7f7f7;
      color: #333;
      font-family: "Yomogi", "Zen Kurenaido", "Hiragino Sans", "Yu Gothic", sans-serif;
    }

    .wrap {
      max-width: 560px;
      margin: 0 auto;
      padding: 16px;
    }

    h1 {
      margin: 8px 0 14px;
      font-size: 24px;
      text-align: center;
      font-family: "Yomogi", sans-serif;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 6px 20px rgba(0,0,0,.08);
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-weight: 700;
      margin: 12px 0 6px;
      font-size: 16px;
    }

    input, textarea, select, button {
      width: 100%;
      box-sizing: border-box;
      font-size: 17px;
      border-radius: 10px;
      border: 1px solid #ccc;
      padding: 10px;
      font-family: "Yomogi","Zen Kurenaido","Kiwi Maru","Kaisei Decol","Yu Gothic",sans-serif;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
      line-height: 1.7;
    }

    button {
      border: none;
      background: #75c7d8;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      margin-top: 12px;
      font-size: 18px;
    }

    button.secondary {
      background: #f5a9bd;
    }

    canvas {
      width: 100%;
      height: auto;
      background: #fff;
      border-radius: 12px;
      display: block;
    }

    .note {
      font-size: 13px;
      color: #666;
      line-height: 1.6;
    }
  input::placeholder, textarea::placeholder{
  font-family:"Yomogi","Zen Kurenaido","Kiwi Maru","Kaisei Decol","Yu Gothic",sans-serif;
}
</style>
</head>

<body>
  <div class="wrap">
    <h1>🎋 七夕 願い事メーカー</h1>

    <div class="card">
      <label for="wish">願い事</label>
      <textarea id="wish" placeholder="例：毎日楽しく過ごせますように"></textarea>

      <label for="name">名前</label>
      <input id="name" placeholder="例：まきみん">

      <label for="fontChoice">フォント</label>
      <select id="fontChoice">
        <option value="Yomogi" selected>やさしい手書き</option>
        <option value="Zen Kurenaido">すっきり手書き</option>
        <option value="Kiwi Maru">丸文字</option>
        <option value="Kaisei Decol">少し和風</option>
      </select>

      <button id="drawBtn">短冊を作る</button>
      <button id="downloadBtn" class="secondary">PNGでダウンロード</button>

      <p class="note">入力した文字はサーバーに送信されません。このページ内だけで画像を作ります。</p>
    </div>

    <div class="card">
      <canvas id="canvas" width="500" height="1200"></canvas>
    </div>
  </div>

function splitVerticalLines(text, maxCharsPerLine) {
  const lines = [];
  let current = "";

  for (const ch of text) {
    if (ch === "\n" || current.length >= maxCharsPerLine) {
      if (current) lines.push(current);
      current = ch === "\n" ? "" : ch;
    } else {
      current += ch;
    }
  }

  if (current) lines.push(current);
  return lines.length ? lines : [""];
}

function makeVerticalLayout(text, area, startFontSize, minFontSize, maxCharsPerLine) {
  let fontSize = startFontSize;
  let lines = [];
  let lineGap = fontSize * 1.28;

  while (fontSize >= minFontSize) {
    lineGap = fontSize * 1.28;
    lines = splitVerticalLines(text, maxCharsPerLine);

    const longest = Math.max(...lines.map(line => [...line].length), 1);
    const textHeight = longest * fontSize * 1.18;
    const textWidth = lines.length * lineGap;

    if (textHeight <= area.height && textWidth <= area.width) {
      break;
    }
    fontSize -= 2;
  }

  lineGap = fontSize * 1.28;
  const longest = Math.max(...lines.map(line => [...line].length), 1);
  const textHeight = longest * fontSize * 1.18;
  const textWidth = lines.length * lineGap;

  return { lines, fontSize, lineGap, textHeight, textWidth };
}

function drawVerticalLines(layout, centerX, y, color) {
  const fontName = document.getElementById("fontChoice").value;

  ctx.fillStyle = color;
  ctx.font = `${layout.fontSize}px "${fontName}", "Yomogi", "Zen Kurenaido", "Kiwi Maru", "Kaisei Decol", "Hiragino Maru Gothic ProN", "Yu Gothic", sans-serif`;
  ctx.textAlign = "center";
  ctx.textBaseline = "top";

  const firstLineX = centerX + ((layout.lines.length - 1) * layout.lineGap) / 2;

  layout.lines.forEach((line, lineIndex) => {
    const lineX = firstLineX - lineIndex * layout.lineGap;
    [...line].forEach((ch, i) => {
      ctx.fillText(ch, lineX, y + i * layout.fontSize * 1.18);
    });
  });
}

function drawCenteredWish(text) {
  const area = {
    x: 120,
    y: 170,
    width: 260,
    height: 720
  };

  const layout = makeVerticalLayout(text, area, 62, 24, 13);

  // 願い事の列数に関係なく、画像中央にくるように調整
  const centerX = area.x + area.width / 2;
  const y = area.y + Math.max(0, (area.height - layout.textHeight) / 2);

  drawVerticalLines(layout, centerX, y, "#3f3f3f");

  return { area, layout, centerX, y };
}

function drawNameAuto(name, wishInfo) {
  if (!name) return;

  const layout = makeVerticalLayout(name, { x: 0, y: 0, width: 90, height: 220 }, 40, 22, 5);

  // 願い事の左端を避けて、左下に自動配置
  const wishLeft = wishInfo.centerX - wishInfo.layout.textWidth / 2;
  let centerX = Math.min(85, wishLeft - 55);

  // 左に行きすぎないようにする
  centerX = Math.max(58, centerX);

  const y = 870;
  drawVerticalLines(layout, centerX, y, "#3f3f3f");
}

function draw() {
  const wish = document.getElementById("wish").value.trim() || "願い事を入力してください";
  const name = document.getElementById("name").value.trim() || "";

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // 元画像サイズそのままに描画
  ctx.drawImage(bgImage, 0, 0, 500, 1200);

  const wishInfo = drawCenteredWish(wish);
  drawNameAuto(name, wishInfo);
}

document.getElementById("drawBtn").addEventListener("click", draw);
document.getElementById("fontChoice").addEventListener("change", draw);

document.getElementById("downloadBtn").addEventListener("click", () => {
  draw();
  const a = document.createElement("a");
  a.download = "tanabata-wish.png";
  a.href = canvas.toDataURL("image/png");
  a.click();
});

bgImage.onload = () => {
  document.fonts.ready.then(draw);
};
</script>
</body>
</html>
